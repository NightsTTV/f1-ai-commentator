name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Resolve dependencies
        run: pip install -r f1-app/requirements.txt
      - name: Byte-compile backend
        run: python -m compileall -q f1-app/backend
